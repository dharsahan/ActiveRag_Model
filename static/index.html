<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Active RAG - Neobrutalism</title>
    <!-- React & Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Space+Grotesk', sans-serif;
            background-color: #f0f0f0;
        }
        .neo-brutalist-border {
            border: 4px solid #000;
        }
        .neo-brutalist-shadow {
            box-shadow: 8px 8px 0px #000;
        }
        .neo-brutalist-shadow-hover:hover {
            transform: translate(-4px, -4px);
            box-shadow: 12px 12px 0px #000;
        }
        .neo-brutalist-shadow-active:active {
            transform: translate(4px, 4px);
            box-shadow: 2px 2px 0px #000;
        }
        .chat-bubble-user {
            background-color: #FFDE03; /* Yellow */
        }
        .chat-bubble-bot {
            background-color: #00E5FF; /* Cyan */
        }
        .btn-action {
            background-color: #FF4081; /* Pink */
            color: #fff;
            font-weight: bold;
            transition: all 0.1s;
        }
        .stats-card {
            background-color: #fff;
        }
        .path-badge {
            display: inline-block;
            padding: 2px 8px;
            font-weight: bold;
            text-transform: uppercase;
            border: 2px solid #000;
            background: #fff;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [stats, setStats] = useState(null);
            const [currentStreamingText, setCurrentStreamingText] = useState('');
            const messagesEndRef = useRef(null);

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            };

            useEffect(() => {
                scrollToBottom();
            }, [messages, currentStreamingText]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!input.trim() || loading) return;

                const userMsg = { role: 'user', text: input };
                setMessages(prev => [...prev, userMsg]);
                setInput('');
                setLoading(true);
                setCurrentStreamingText('');

                try {
                    const response = await fetch('/query/stream', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ query: input })
                    });

                    if (!response.body) throw new Error('ReadableStream not supported');
                    
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let botMsg = { 
                        role: 'bot', 
                        text: '',
                        citations: [],
                        path: 'retrieving...',
                        confidence: null
                    };

                    while (true) {
                        const { value, done } = await reader.read();
                        if (done) break;
                        
                        const chunk = decoder.decode(value, { stream: true });
                        const lines = chunk.split('\n');
                        
                        for (const line of lines) {
                            if (!line.trim()) continue;
                            try {
                                const event = JSON.parse(line);
                                
                                if (event.type === 'token') {
                                    botMsg.text += event.content;
                                    setCurrentStreamingText(botMsg.text);
                                } else if (event.type === 'metadata') {
                                    botMsg.path = event.path;
                                    botMsg.confidence = event.confidence;
                                    botMsg.reasoning = event.reasoning;
                                    setStats(event);
                                } else if (event.type === 'citations') {
                                    botMsg.citations = event.content;
                                } else if (event.type === 'error') {
                                    botMsg.text += ` [Error: ${event.content}]`;
                                    setCurrentStreamingText(botMsg.text);
                                }
                            } catch (e) {
                                console.error("Error parsing stream chunk", e);
                            }
                        }
                    }
                    
                    setMessages(prev => [...prev, botMsg]);
                    setCurrentStreamingText('');
                } catch (err) {
                    setMessages(prev => [...prev, { role: 'bot', text: 'Error: Could not reach the API.' }]);
                } finally {
                    setLoading(false);
                }
            };

            const clearMemory = async () => {
                await fetch('/clear-memory', { method: 'POST' });
                setMessages([{ role: 'bot', text: 'Memory cleared!' }]);
            };

            return (
                <div class="max-w-4xl mx-auto space-y-8">
                    {/* Header */}
                    <header class="neo-brutalist-border neo-brutalist-shadow bg-[#FFDE03] p-6 text-center">
                        <h1 class="text-4xl md:text-6xl font-bold uppercase tracking-tighter text-black">Active RAG</h1>
                        <p class="text-lg font-bold mt-2">Hybrid Search + Neural Reranking</p>
                    </header>

                    {/* Stats & Controls */}
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="neo-brutalist-border neo-brutalist-shadow stats-card p-4 space-y-2">
                            <h3 class="font-bold border-b-2 border-black pb-1 uppercase">System Status</h3>
                            <div class="flex justify-between">
                                <span>Path:</span>
                                <span class="path-badge">{stats?.path || 'IDLE'}</span>
                            </div>
                            <div class="flex justify-between">
                                <span>Confidence:</span>
                                <span class="font-bold">{stats?.confidence ? (stats.confidence * 100).toFixed(0) + '%' : 'N/A'}</span>
                            </div>
                        </div>

                        <div class="neo-brutalist-border neo-brutalist-shadow stats-card p-4 space-y-2">
                            <h3 class="font-bold border-b-2 border-black pb-1 uppercase">Retrieval</h3>
                            <div class="flex justify-between">
                                <span>Indexed:</span>
                                <span class="font-bold">{stats?.web_pages_indexed || 0} pages</span>
                            </div>
                            <div class="flex justify-between">
                                <span>Reranker:</span>
                                <span class="font-bold text-green-600">ACTIVE</span>
                            </div>
                        </div>

                        <div class="flex flex-col gap-4">
                            <button onClick={clearMemory} class="neo-brutalist-border neo-brutalist-shadow neo-brutalist-shadow-hover neo-brutalist-shadow-active btn-action p-3 uppercase flex-1">
                                Clear Memory
                            </button>
                            <button onClick={() => setMessages([])} class="neo-brutalist-border neo-brutalist-shadow neo-brutalist-shadow-hover neo-brutalist-shadow-active bg-[#00E5FF] p-3 font-bold uppercase flex-1 text-black">
                                Clear Chat
                            </button>
                        </div>
                    </div>

                    {/* Chat Area */}
                    <div class="neo-brutalist-border neo-brutalist-shadow bg-white h-[500px] flex flex-col">
                        <div class="flex-1 overflow-y-auto p-4 space-y-6">
                            {messages.length === 0 && !currentStreamingText && (
                                <div class="text-center mt-20 opacity-50 uppercase font-bold text-xl">
                                    Ready to retrieve...
                                </div>
                            )}
                            {messages.map((m, i) => (
                                <div key={i} class={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                    <div class={`max-w-[80%] p-4 neo-brutalist-border neo-brutalist-shadow ${m.role === 'user' ? 'chat-bubble-user text-black' : 'chat-bubble-bot text-black'}`}>
                                        <div class="font-bold mb-2 uppercase text-xs opacity-70">{m.role}</div>
                                        <div class="text-lg whitespace-pre-wrap">{m.text}</div>
                                        
                                        {m.citations && m.citations.length > 0 && (
                                            <div class="mt-4 pt-4 border-t-2 border-black">
                                                <p class="font-bold text-xs uppercase mb-2">Sources:</p>
                                                <ul class="space-y-1">
                                                    {m.citations.map((c, j) => (
                                                        <li key={j} class="text-xs truncate">
                                                            <a href={c} target="_blank" class="underline hover:bg-black hover:text-white transition-colors">{c}</a>
                                                        </li>
                                                    ))}
                                                </ul>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            ))}
                            {currentStreamingText && (
                                <div class="flex justify-start">
                                    <div class="max-w-[80%] p-4 neo-brutalist-border neo-brutalist-shadow chat-bubble-bot text-black">
                                        <div class="font-bold mb-2 uppercase text-xs opacity-70">bot (streaming)</div>
                                        <div class="text-lg whitespace-pre-wrap">{currentStreamingText}</div>
                                    </div>
                                </div>
                            )}
                            {loading && !currentStreamingText && (
                                <div class="flex justify-start">
                                    <div class="p-4 neo-brutalist-border neo-brutalist-shadow chat-bubble-bot text-black animate-pulse uppercase font-bold">
                                        Retrieving Context...
                                    </div>
                                </div>
                            )}
                            <div ref={messagesEndRef} />
                        </div>

                        {/* Input Area */}
                        <form onSubmit={handleSubmit} class="p-4 bg-[#f0f0f0] border-t-4 border-black flex gap-4">
                            <input 
                                type="text"
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                                placeholder="Ask anything (hybrid search + reranking active)..."
                                class="flex-1 p-4 neo-brutalist-border font-bold text-lg focus:outline-none text-black"
                                disabled={loading}
                            />
                            <button 
                                type="submit"
                                class="neo-brutalist-border neo-brutalist-shadow neo-brutalist-shadow-hover neo-brutalist-shadow-active btn-action px-8 uppercase"
                                disabled={loading || !input.trim()}
                            >
                                Send
                            </button>
                        </form>
                    </div>
                    
                    <footer class="text-center font-bold uppercase opacity-50 pb-8 text-black">
                        Hybrid RAG (BM25 + Vector + Re-ranker)
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
